<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>末世武侠 UI Demo - 稳定版</title>
    <!-- 使用 Tailwind CDN (内地访问通常稳定) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 使用国内通用的系统字体栈，模拟宋体质感 */
        body { 
            font-family: "Source Han Serif SC", "Source Han Serif", "Noto Serif CJK SC", "Songti SC", "SimSun", serif;
            background-color: #1c1815; 
            color: #f3f4f6; 
            overflow: hidden; 
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .custom-status-scroll::-webkit-scrollbar { width: 3px; }
        .custom-status-scroll::-webkit-scrollbar-thumb { background: rgba(212, 163, 115, 0.2); border-radius: 10px; }
        .modal-bg { background-color: rgba(0, 0, 0, 0.95); backdrop-filter: blur(16px); }
        /* 按钮与卡片动效 */
        .btn-active:active { transform: scale(0.95); }
        .node-hover:hover { border-color: #fbbf24; background-color: #2b211b; }
    </style>
</head>
<body class="flex flex-col h-screen select-none">

    <!-- 1. 核心视口 -->
    <div class="relative flex-1 flex items-center justify-center border-b-2 border-[#4d3f35] overflow-hidden">
        <div class="absolute inset-0 pointer-events-none opacity-10 z-10 bg-[url('https://www.transparenttextures.com/patterns/dust.png')]"></div>
        
        <!-- 地图容器 -->
        <div class="relative border-[6px] border-[#4d3f35] bg-[#26211d] shadow-2xl overflow-hidden" style="width: 744px; height: 456px;">
            <div id="map-grid" class="absolute transition-all duration-300 p-3 origin-center" style="width: 1800px; height: 1800px;">
                <!-- JS 自动生成地块 -->
            </div>
            <!-- 玩家角色 -->
            <div id="player-sprite" class="absolute z-20 flex items-center justify-center transition-all duration-300 pointer-events-none" style="width: 72px; height: 72px;">
                <div class="w-11 h-11 bg-[#5b1c03] rounded-xl border-2 border-[#fbbf24]/50 flex items-center justify-center shadow-xl">
                    <span class="text-xl">👤</span>
                </div>
            </div>
        </div>

        <!-- 侧边 HUD 层 -->
        <div class="absolute inset-0 pointer-events-none z-30">
            <!-- 左侧状态面板 -->
            <div id="left-hud" class="absolute left-6 top-6 bottom-24 w-72 flex flex-col pointer-events-auto transition-all duration-500">
                <!-- 角色卡 -->
                <div class="bg-[#2d241e]/95 border-2 border-[#d4a373]/40 p-4 shadow-xl mb-3">
                    <h1 class="text-xl font-black text-white tracking-[0.2em]">沈遗墨</h1>
                    <p class="text-[10px] text-[#fbbf24] font-bold mt-1 uppercase">称号 · 初入末世</p>
                </div>
                <!-- 属性列表 -->
                <div id="status-scroll" class="flex-1 overflow-y-auto custom-status-scroll space-y-3 pr-2">
                    <!-- 即时机能 -->
                    <div class="bg-[#1c1612]/90 border border-[#4d3f35] p-3 text-[11px] font-bold space-y-2">
                        <div class="flex justify-between items-center"><span class="text-stone-500">生命状态</span><span class="text-green-500">健康</span></div>
                        <div class="flex justify-between items-center"><span class="text-stone-500">身手感官</span><span class="text-stone-300">轻快</span></div>
                    </div>
                    <!-- 肢体状态 -->
                    <div class="bg-[#1c1612]/90 border border-[#4d3f35] p-3 space-y-1.5 text-[11px]">
                        <div class="text-[9px] text-[#fbbf24] mb-2 uppercase opacity-50 tracking-widest font-black">肢体检视</div>
                        <div class="flex justify-between"><span>头</span><span class="text-stone-600">完好</span></div>
                        <div class="flex justify-between"><span>胸</span><span class="text-stone-600">完好</span></div>
                        <div class="flex justify-between"><span>腹</span><span class="text-stone-600">完好</span></div>
                        <div class="flex justify-between"><span>左手</span><span class="text-stone-600">完好</span></div>
                        <div class="flex justify-between"><span>右手</span><span class="text-stone-600">完好</span></div>
                        <div class="flex justify-between text-amber-500"><span>左脚</span><span>轻伤(骨折)</span></div>
                        <div class="flex justify-between"><span>右脚</span><span class="text-stone-600">完好</span></div>
                    </div>
                    <!-- 生存循环 -->
                    <div class="bg-[#1c1612]/90 border border-[#4d3f35] p-3 space-y-3">
                        <div class="flex flex-col gap-1">
                            <div class="flex justify-between text-[10px] font-black"><span class="text-stone-500">饱食</span><span class="text-white">稍饿</span></div>
                            <div class="h-0.5 bg-stone-900 overflow-hidden"><div class="h-full bg-orange-700/40 w-4/5"></div></div>
                        </div>
                        <div class="flex flex-col gap-1">
                            <div class="flex justify-between text-[10px] font-black"><span class="text-stone-500">饮水</span><span class="text-white">不渴</span></div>
                            <div class="h-0.5 bg-stone-900 overflow-hidden"><div class="h-full bg-blue-700/40 w-full"></div></div>
                        </div>
                    </div>
                    <!-- 快捷腰带 -->
                    <div class="bg-[#1c1612]/95 border-2 border-[#4d3f35] p-2 grid grid-cols-3 gap-1.5 shadow-lg">
                        <div class="aspect-square border border-stone-800 bg-black/40 flex items-center justify-center hover:border-[#fbbf24] cursor-pointer text-lg">🍷</div>
                        <div class="aspect-square border border-stone-800 bg-black/40 flex items-center justify-center hover:border-[#fbbf24] cursor-pointer text-lg">🗡️</div>
                        <div class="aspect-square border border-stone-800 bg-black/40 flex items-center justify-center"></div>
                        <div class="aspect-square border border-stone-800 bg-black/40 flex items-center justify-center"></div>
                        <div class="aspect-square border border-stone-800 bg-black/40 flex items-center justify-center"></div>
                        <div class="aspect-square border border-stone-800 bg-black/40 flex items-center justify-center"></div>
                    </div>
                    <!-- 五维折叠 -->
                    <details open class="border border-[#4d3f35] bg-stone-900/20">
                        <summary class="p-2 text-[10px] font-black text-stone-600 cursor-pointer list-none flex justify-between uppercase">基础五维 <span>▼</span></summary>
                        <div class="p-3 bg-[#1c1612] space-y-2 text-[11px] border-t border-[#3d2d24]">
                            <div class="flex justify-between text-stone-500"><span>筋骨</span><span class="text-stone-300">雄厚</span></div>
                            <div class="flex justify-between text-stone-500"><span>柔韧</span><span class="text-stone-300">一般</span></div>
                        </div>
                    </details>
                </div>
            </div>

            <!-- 右侧动作按钮 -->
            <div id="right-hud" class="absolute right-8 top-1/2 -translate-y-1/2 space-y-6 pointer-events-auto transition-all">
                <button onclick="openTab('inventory')" class="w-14 h-14 bg-[#2d241e] border-2 border-[#4d3f35] rounded flex items-center justify-center hover:border-[#fbbf24] transition-all shadow-xl">🎒</button>
                <button onclick="openTab('combat')" class="w-14 h-14 bg-[#2d241e] border-2 border-[#fbbf24] rounded flex items-center justify-center hover:bg-[#3b271b] transition-all shadow-xl scale-110">⚔️</button>
                <button class="w-14 h-14 bg-[#2d241e] border-2 border-[#4d3f35] rounded flex items-center justify-center hover:border-[#fbbf24] transition-all shadow-xl">⚙️</button>
            </div>
        </div>
    </div>

    <!-- 2. 日志 -->
    <div class="h-52 bg-[#1c1815] flex items-center justify-center relative z-40 border-t border-[#3d2d24]">
        <div id="log-list" class="w-[880px] h-[160px] bg-[#2d241e] border-2 border-[#4d3f35] p-4 overflow-y-auto flex flex-col-reverse text-sm scrollbar-hide">
            <div class="text-stone-500 mb-1"><span class="text-[#fbbf24] mr-3 font-black">»</span>欢迎回到末世江湖，系统资源已离线化。</div>
        </div>
    </div>

    <!-- 3. 武学枢纽弹窗 (1200px) -->
    <div id="modal-combat" class="hidden fixed inset-0 z-[100] modal-bg flex items-center justify-center p-6">
        <div class="relative w-[1200px] h-[780px] bg-[#1c1612] border-2 border-[#d4a373]/30 rounded-2xl shadow-2xl flex flex-col overflow-hidden animate-in">
            <!-- 头部 -->
            <div class="h-16 border-b border-[#3d2d24] flex items-center justify-between px-10 bg-[#1c1612]">
                <div class="flex flex-col">
                    <h2 class="text-xl font-black text-white tracking-[0.6em] uppercase">战斗技能枢纽</h2>
                    <span class="text-[10px] text-stone-600 uppercase tracking-widest mt-1 italic">Combat Node Synchronization</span>
                </div>
                <button onclick="closeModals()" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-red-900/20 text-stone-500 hover:text-white transition-all">✖</button>
            </div>

            <div class="flex-1 flex overflow-hidden">
                <!-- 左：枢纽核心 -->
                <div class="w-[380px] border-r border-[#3d2d24] flex flex-col p-8 bg-[#18120e] overflow-y-auto scrollbar-hide">
                    <div class="mb-8 space-y-4">
                        <div class="text-[10px] font-black text-[#fbbf24] border-l-2 border-[#fbbf24] pl-4 uppercase">全局核心枢纽</div>
                        <div class="grid grid-cols-2 gap-3">
                            <div id="hub-breath" class="h-20 rounded border-2 border-[#fbbf24] bg-[#2b211b] flex flex-col items-center justify-center transition-all">
                                <span class="text-[8px] font-black text-[#fbbf24] uppercase mb-1">内息核心</span>
                                <span id="val-breath" class="text-xs font-black text-white">禅定呼吸</span>
                            </div>
                            <div id="hub-light" class="h-20 rounded border-2 border-stone-900 bg-[#120e0c] flex flex-col items-center justify-center transition-all">
                                <span class="text-[8px] font-black text-stone-500 uppercase mb-1">身法核心</span>
                                <span id="val-light" class="text-xs font-black text-stone-700 italic">未载入</span>
                            </div>
                        </div>
                    </div>
                    <div class="text-[10px] font-black text-stone-700 border-l-2 border-stone-800 pl-4 uppercase mb-5">肢体部件负载</div>
                    <div id="limb-container" class="flex flex-col gap-6">
                        <!-- 由渲染脚本动态填充 -->
                    </div>
                </div>

                <!-- 右：库列表 -->
                <div class="flex-1 flex flex-col p-10 bg-[#1c1612]">
                    <div id="category-tabs" class="flex gap-3 mb-10">
                        <!-- 分类按钮 -->
                    </div>
                    <div id="skill-list" class="flex-1 overflow-y-auto pr-4 flex flex-col gap-3 scrollbar-hide">
                        <!-- 技能列表项 -->
                    </div>
                </div>
            </div>

            <!-- 底部：招式序列 -->
            <div class="h-[240px] border-t border-[#3d2d24] bg-[#1c1612] flex items-center px-12 gap-12 flex-shrink-0 relative">
                <div class="flex-1 flex flex-col gap-5 min-w-0">
                    <div class="flex items-baseline gap-6">
                        <h3 id="skill-title" class="text-3xl font-black text-white tracking-[0.3em]">--</h3>
                        <div class="flex gap-2">
                            <div id="skill-level" class="px-3 py-0.5 bg-stone-900 text-[10px] font-black text-stone-500 uppercase">等级 0</div>
                            <div id="skill-prof" class="px-3 py-0.5 bg-[#fbbf24]/10 border border-[#fbbf24]/30 text-[10px] font-black text-[#fbbf24] uppercase">总熟练度 0%</div>
                        </div>
                    </div>
                    <div id="move-sequence" class="flex flex-wrap gap-4 py-2 relative">
                        <!-- 招式节点 -->
                    </div>
                </div>
                <div class="w-64 flex flex-col gap-4">
                    <button onclick="handleDeploy()" class="w-full py-5 rounded bg-[#fbbf24] hover:bg-amber-400 text-black font-black uppercase tracking-[0.4em] shadow-xl active:scale-95 transition-all">⚡ 载入核心</button>
                    <div id="target-indicator" class="text-[10px] text-[#fbbf24] font-black uppercase tracking-widest text-center bg-black/40 px-3 py-1 rounded border border-[#3d2d24]">
                        右手部件 · 进攻
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 招式选择弹出窗 -->
    <div id="picker-move" class="hidden fixed z-[300] w-48 bg-[#1c1612] border-2 border-[#fbbf24] rounded shadow-2xl overflow-hidden">
        <div class="p-2 bg-[#261e18] text-[9px] font-black text-[#fbbf24] text-center uppercase tracking-widest">选择序列招式</div>
        <div id="picker-list" class="max-h-64 overflow-y-auto custom-status-scroll"></div>
    </div>

    <!-- 原生脚本 -->
    <script>
        // 1. 数据定义 (Icons 使用 Emoji 代替以确保 100% 离线兼容)
        const SKILLS = [
            { id: 's1', name: '基本拳脚', cat: 'unarmed', lv: 120, pr: 75, desc: '基础徒手功法，讲究大巧不工。', moves: ['直拳','前踢','勾拳','鞭腿','冲拳','撩阴腿'], icon: '👊' },
            { id: 's2', name: '太极拳', cat: 'unarmed', lv: 85, pr: 45, desc: '以柔克刚，武当入门功法。', moves: ['揽雀尾','单鞭','提手上势','白鹤亮翅'], icon: '☯️' },
            { id: 's3', name: '狂风快刀', cat: 'weapon', lv: 30, pr: 30, desc: '刀势如风，一旦开启连绵不绝。', moves: ['劈山','横抹','缠头','裹脑'], icon: '⚔️' },
            { id: 's4', name: '草上飞', cat: 'light', lv: 40, pr: 75, desc: '提气轻身，如草上疾行。', moves: ['提气','踏草','凌空','纵跃'], icon: '🍃' },
            { id: 's5', name: '禅定呼吸', cat: 'breath', lv: 50, pr: 75, desc: '调节气机，平复伤势。', moves: ['吐纳','闭气','导引','聚气'], icon: '♾️' },
            { id: 's6', name: '基础招架', cat: 'parry', lv: 80, pr: 60, desc: '防守反击的核心技巧。', moves: ['格挡','卸力','闪避','反制'], icon: '🛡️' }
        ];

        const CATEGORIES = [
            { id: 'unarmed', label: '徒手', icon: '🖐️' },
            { id: 'weapon', label: '兵器', icon: '⚔️' },
            { id: 'light', label: '轻功', icon: '👟' },
            { id: 'breath', label: '呼吸', icon: '🫁' },
            { id: 'parry', label: '招架', icon: '🛡️' }
        ];

        const LIMBS = [
            { id: 'lh', label: '左手部件', icon: '🤚' },
            { id: 'rh', label: '右手部件', icon: '🤚' },
            { id: 'lf', label: '左腿部件', icon: '👣' },
            { id: 'rf', label: '右腿部件', icon: '👣' }
        ];

        // 2. 状态管理
        let state = {
            pos: { x: 12, y: 12 },
            curCat: 'unarmed',
            curSkillId: 's1',
            curPart: 'rh',
            curSlot: 'active',
            skillData: {}, // 存储自定义序列
            body: {
                lh: { active: null, parry: 's6', p: 3 },
                rh: { active: 's1', parry: null, p: 1 },
                lf: { active: null, parry: null, p: 4 },
                rf: { active: null, parry: null, p: 2 },
            },
            hubs: { breath: 's5', light: null },
            editingSlot: null
        };

        // 3. 渲染核心
        function render() {
            // A. 地图渲染
            const grid = document.getElementById('map-grid');
            grid.innerHTML = '';
            for(let i=0; i<625; i++){
                const x = i % 25, y = Math.floor(i / 25);
                const isNear = Math.abs(x-state.pos.x)<=1 && Math.abs(y-state.pos.y)<=1 && (x!==state.pos.x || y!==state.pos.y);
                const tile = document.createElement('div');
                tile.className = `absolute rounded border border-white/5 transition-colors duration-300 ${isNear ? 'bg-[#3d332c] hover:bg-[#4d3f35] cursor-pointer' : 'bg-[#312a24]'}`;
                tile.style.cssText = `width:62px;height:62px;left:${x*72+5}px;top:${y*72+5}px;`;
                if(isNear) tile.onclick = () => { state.pos = {x, y}; addLog("风沙中，你感到疲惫。"); render(); };
                grid.appendChild(tile);
            }
            document.getElementById('map-grid').style.transform = `translate(${(5-0.5-state.pos.x)*72}px, ${(3-0.5-state.pos.y)*72}px)`;
            document.getElementById('player-sprite').style.transform = `translate(${state.pos.x*72}px, ${state.pos.y*72}px)`;

            // B. 面板 - 分类标签
            const catBox = document.getElementById('category-tabs');
            catBox.innerHTML = '';
            CATEGORIES.forEach(c => {
                const btn = document.createElement('button');
                const isS = state.curCat === c.id;
                btn.className = `flex items-center gap-3 px-6 py-2.5 rounded-full text-xs font-black border-2 transition-all ${isS ? 'bg-[#fbbf24] text-black border-[#fbbf24]' : 'bg-[#120e0c] text-stone-600 border-stone-900 hover:text-[#fbbf24]'}`;
                btn.innerHTML = `${c.icon} ${c.label}`;
                btn.onclick = () => { 
                    state.curCat = c.id; 
                    const first = SKILLS.find(s=>s.cat === c.id);
                    if(first) state.curSkillId = first.id;
                    render(); 
                };
                catBox.appendChild(btn);
            });

            // C. 面板 - 技能列表
            const list = document.getElementById('skill-list');
            list.innerHTML = '';
            SKILLS.filter(s => s.cat === state.curCat).forEach(s => {
                const isS = state.curSkillId === s.id;
                const div = document.createElement('div');
                div.className = `flex items-center justify-between px-8 py-5 rounded-xl border-2 transition-all cursor-pointer ${isS ? 'border-[#fbbf24] bg-[#2b211b] shadow-2xl' : 'border-stone-900 bg-[#14100e] hover:border-stone-800'}`;
                div.innerHTML = `
                    <div class="flex items-center gap-6">
                        <div class="text-2xl">${s.icon}</div>
                        <div class="flex flex-col">
                            <span class="text-lg font-black tracking-widest text-white uppercase">${s.name}</span>
                            <span class="text-[10px] text-[#fbbf24] font-black uppercase mt-1">等级 ${s.lv} · 熟练 ${s.pr}%</span>
                        </div>
                    </div>
                `;
                div.onclick = () => { state.curSkillId = s.id; render(); };
                list.appendChild(div);
            });

            // D. 枢纽与肢体配置
            const limbBox = document.getElementById('limb-container');
            limbBox.innerHTML = '';
            const isGlobal = state.curCat === 'breath' || state.curCat === 'light';
            limbBox.className = `flex flex-col gap-5 transition-all ${isGlobal ? 'opacity-20 pointer-events-none' : 'opacity-100'}`;
            
            document.getElementById('val-breath').innerText = SKILLS.find(s=>s.id === state.hubs.breath)?.name || '未载入';
            document.getElementById('val-light').innerText = SKILLS.find(s=>s.id === state.hubs.light)?.name || '未载入';
            
            LIMBS.forEach(l => {
                const div = document.createElement('div');
                div.className = "flex flex-col gap-2.5";
                const activeName = SKILLS.find(s=>s.id === state.body[l.id].active)?.name || '空缺';
                const parryName = SKILLS.find(s=>s.id === state.body[l.id].parry)?.name || '空缺';
                div.innerHTML = `
                    <div class="flex justify-between items-center text-[10px] font-black">
                        <span class="text-stone-500 uppercase tracking-widest">${l.icon} ${l.label}</span>
                        <span class="text-[#fbbf24]">优先级 ${state.body[l.id].p}</span>
                    </div>
                    <div class="flex gap-2">
                        <div onclick="selectSlot('${l.id}','active')" class="flex-1 h-12 border-2 rounded flex flex-col items-center justify-center transition-all cursor-pointer ${state.curPart===l.id && state.curSlot==='active' ? 'border-[#fbbf24] bg-[#2b211b]' : 'border-stone-900 bg-[#120e0c]'}">
                            <span class="text-[7px] text-stone-700 uppercase">进攻</span>
                            <span class="text-xs font-black text-white">${activeName}</span>
                        </div>
                        <div onclick="selectSlot('${l.id}','parry')" class="flex-1 h-12 border-2 rounded flex flex-col items-center justify-center transition-all cursor-pointer ${state.curPart===l.id && state.curSlot==='parry' ? 'border-[#fbbf24] bg-[#2b211b]' : 'border-stone-900 bg-[#120e0c]'}">
                            <span class="text-[7px] text-stone-700 uppercase">招架</span>
                            <span class="text-xs font-black text-white">${parryName}</span>
                        </div>
                    </div>
                `;
                limbBox.appendChild(div);
            });

            // E. 招式详情
            const selS = SKILLS.find(s=>s.id === state.curSkillId);
            document.getElementById('skill-title').innerText = selS.name;
            document.getElementById('skill-level').innerText = `等级 ${selS.lv}`;
            document.getElementById('skill-prof').innerText = `总熟练度 ${selS.pr}%`;
            
            const seqBox = document.getElementById('move-sequence');
            seqBox.innerHTML = '';
            if(!state.skillData[selS.id]) state.skillData[selS.id] = Array(6).fill(selS.moves[0]);
            state.skillData[selS.id].forEach((mv, i) => {
                const node = document.createElement('div');
                node.className = `relative w-36 h-16 border rounded flex flex-col items-center justify-center transition-all cursor-pointer node-hover ${state.editingSlot === i ? 'border-[#fbbf24] bg-[#2b211b] scale-105 shadow-xl' : 'border-stone-900 bg-[#120e0c]'}`;
                node.innerHTML = `
                    <div class="absolute -top-2 left-2 px-1 bg-[#1c1612] text-[9px] font-black italic ${state.editingSlot===i?'text-[#fbbf24]':'text-stone-800'}">0${i+1}</div>
                    <span class="text-xs font-black text-white">${mv}</span>
                    <span class="text-[9px] text-[#fbbf24] font-black uppercase mt-1 opacity-80">熟练度 75%</span>
                    ${i<5 && i!==2 ? '<div class="absolute -right-5 top-1/2 -translate-y-1/2 text-stone-800 opacity-20 text-xl font-black">»</div>' : ''}
                `;
                node.onclick = (e) => { e.stopPropagation(); openMovePicker(i, node); };
                seqBox.appendChild(node);
            });

            // 更新目标描述
            const tDesc = document.getElementById('target-indicator');
            if(state.curCat === 'breath') tDesc.innerText = "内息枢纽 · 核心";
            else if(state.curCat === 'light') tDesc.innerText = "身法枢纽 · 核心";
            else {
                const lObj = LIMBS.find(l=>l.id===state.curPart);
                tDesc.innerText = `${lObj.label} · ${state.curSlot==='active'?'进攻':'招架'}`;
            }
        }

        // 4. 交互逻辑
        function addLog(t) {
            const list = document.getElementById('log-list');
            const div = document.createElement('div');
            div.className = "text-stone-400 mb-1 animate-in slide-in-from-left-1";
            div.innerHTML = `<span class="text-[#fbbf24] mr-3 font-black">»</span>${t}`;
            list.prepend(div);
        }

        function openTab(id) {
            if(id === 'combat') document.getElementById('modal-combat').classList.remove('hidden');
            document.getElementById('left-hud').classList.add('opacity-10', 'blur-sm');
        }

        function closeModals() {
            document.getElementById('modal-combat').classList.add('hidden');
            document.getElementById('left-hud').classList.remove('opacity-10', 'blur-sm');
        }

        function selectSlot(pid, sid) {
            state.curPart = pid;
            state.curSlot = sid;
            render();
        }

        function openMovePicker(idx, anchor) {
            state.editingSlot = idx;
            const picker = document.getElementById('picker-move');
            const list = document.getElementById('picker-list');
            const selS = SKILLS.find(s=>s.id === state.curSkillId);
            list.innerHTML = '';
            selS.moves.forEach(m => {
                const btn = document.createElement('button');
                btn.className = "w-full p-4 text-left border-b border-stone-800/50 hover:bg-[#fbbf24] hover:text-black flex flex-col transition-colors group";
                btn.innerHTML = `<span class="text-xs font-black tracking-widest uppercase">${m}</span><span class="text-[9px] text-[#fbbf24] group-hover:text-black font-black">熟练 75%</span>`;
                btn.onclick = () => {
                    state.skillData[selS.id][idx] = m;
                    state.editingSlot = null;
                    picker.classList.add('hidden');
                    render();
                };
                list.appendChild(btn);
            });
            const r = anchor.getBoundingClientRect();
            picker.style.left = `${r.left}px`;
            picker.style.top = `${r.top - 200}px`;
            picker.classList.remove('hidden');
        }

        function handleDeploy() {
            const sk = SKILLS.find(s=>s.id === state.curSkillId);
            if(state.curCat === 'breath') state.hubs.breath = state.curSkillId;
            else if(state.curCat === 'light') state.hubs.light = state.curSkillId;
            else {
                state.body[state.curPart][state.curSlot] = state.curSkillId;
            }
            addLog(`[${sk.name}] 已成功载入核心配置。`);
            render();
        }

        // 初始化
        window.onclick = () => { document.getElementById('picker-move').classList.add('hidden'); state.editingSlot = null; };
        render();
    </script>
</body>
</html>
