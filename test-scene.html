<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潮碧物语 - 基地测试场景</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Source Han Serif SC", "Noto Serif CJK SC", "SimSun", serif;
            background: #1c1815;
            color: #e8e6e3;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #map-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-bottom: 2px solid #4d3f35;
        }
        #map-container {
            overflow: hidden;
            position: relative;
            width: 744px;
            height: 456px;
            background: #26211d;
            border: 6px solid #4d3f35;
            border-radius: 4px;
        }
        #map-grid {
            position: absolute;
            left: 0;
            top: 0;
            width: 1152px;
            height: 1152px;
            transition: transform 0.15s ease-out;
        }
        .tile {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.08);
            background: #312a24;
        }
        .tile.adjacent {
            background: #3d332c;
            cursor: pointer;
            border-color: rgba(255,255,255,0.15);
        }
        .tile.adjacent:hover {
            background: #4d3f35;
        }
        .tile.player {
            background: #3d2a1a;
            border-color: rgba(251,191,36,0.4);
        }
        .tile.portal {
            border-color: rgba(100,200,255,0.35);
            background: #2a2d35;
        }
        .tile.portal.adjacent {
            background: #353a45;
        }
        .tile.portal.adjacent:hover {
            background: #454a55;
        }
        .tile.blocked {
            background: #3d2a2a;
            border-color: rgba(180,80,80,0.4);
            cursor: not-allowed;
        }
        .tile.blocked.adjacent {
            cursor: not-allowed;
        }
        #player-sprite {
            position: absolute;
            z-index: 20;
            width: 72px;
            height: 72px;
            left: 336px;
            top: 192px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        #player-sprite .avatar {
            width: 44px;
            height: 44px;
            background: #5b1c03;
            border: 2px solid rgba(251,191,36,0.5);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        #footer {
            height: 48px;
            background: #1c1815;
            border-top: 1px solid #3d2d24;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: #78716c;
        }
    </style>
</head>
<body>

    <div id="map-wrap">
        <div id="map-container">
            <div id="map-grid"></div>
            <div id="player-sprite">
                <div class="avatar">👤</div>
            </div>
        </div>
    </div>

    <div id="footer">
        <span id="footer-text">基地 · 方向键或点击相邻格子移动</span>
    </div>

    <script src="js/game-engine.js"></script>
    <script>
        (function () {
            var E = window.GameEngine;
            var CELL_PX = E.CELL_PX;
            var CENTER_OFFSET_X = E.CENTER_OFFSET_X;
            var CENTER_OFFSET_Y = E.CENTER_OFFSET_Y;

            function render() {
                var grid = document.getElementById('map-grid');
                var footerText = document.getElementById('footer-text');
                if (!grid) return;

                var map = E.getMap();
                var st = E.getState();
                if (!map) return;

                grid.innerHTML = '';
                grid.style.width = (map.width * CELL_PX) + 'px';
                grid.style.height = (map.height * CELL_PX) + 'px';

                var gap = 1;
                for (var gy = 0; gy < map.height; gy++) {
                    for (var gx = 0; gx < map.width; gx++) {
                        var tile = document.createElement('div');
                        var isPlayer = gx === st.x && gy === st.y;
                        var adjacent = E.isAdjacent(gx, gy);
                        var walkable = E.isWalkable(gx, gy);
                        var portal = E.getPortalAt(gx, gy);

                        tile.className = 'tile';
                        if (!walkable) tile.classList.add('blocked');
                        if (portal) tile.classList.add('portal');
                        if (isPlayer) tile.classList.add('player');
                        else if (adjacent && walkable) {
                            tile.classList.add('adjacent');
                            tile.onclick = (function (tx, ty) { return function () { E.moveTo(tx, ty); }; })(gx, gy);
                        } else if (adjacent) {
                            tile.classList.add('adjacent');
                        }
                        if (portal && portal.label) tile.title = portal.label;
                        else if (!walkable) tile.title = '不可走';

                        tile.style.left = (gx * CELL_PX + gap) + 'px';
                        tile.style.top = (gy * CELL_PX + gap) + 'px';
                        grid.appendChild(tile);
                    }
                }

                var tx = CENTER_OFFSET_X - st.x * CELL_PX;
                var ty = CENTER_OFFSET_Y - st.y * CELL_PX;
                grid.style.transform = 'translate(' + tx + 'px, ' + ty + 'px)';

                if (footerText) footerText.textContent = map.name + ' ' + map.width + '×' + map.height + ' · 方向键或点击相邻可走格子移动';
            }

            E.onChange(render);

            document.addEventListener('keydown', function (e) {
                var dx = 0, dy = 0;
                switch (e.key) {
                    case 'ArrowUp':    case 'w': case 'W': dy = -1; break;
                    case 'ArrowDown':  case 's': case 'S': dy =  1; break;
                    case 'ArrowLeft':  case 'a': case 'A': dx = -1; break;
                    case 'ArrowRight': case 'd': case 'D': dx =  1; break;
                    default: return;
                }
                e.preventDefault();
                var st = E.getState();
                E.moveTo(st.x + dx, st.y + dy);
            });

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', render);
            } else {
                render();
            }
        })();
    </script>
</body>
</html>
