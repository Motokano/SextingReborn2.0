<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潮碧物语 - 基地测试场景</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Source Han Serif SC", "Noto Serif CJK SC", "SimSun", serif;
            background: #1c1815;
            color: #e8e6e3;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #map-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-bottom: 2px solid #4d3f35;
        }
        #map-container {
            overflow: hidden;
            position: relative;
            width: 744px;
            height: 456px;
            background: #26211d;
            border: 6px solid #4d3f35;
            border-radius: 4px;
        }
        #map-grid {
            position: absolute;
            left: 0;
            top: 0;
            width: 1152px;
            height: 1152px;
            transition: transform 0.15s ease-out;
        }
        .tile {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.08);
            background: #312a24;
        }
        .tile.adjacent {
            background: #3d332c;
            cursor: pointer;
            border-color: rgba(255,255,255,0.15);
        }
        .tile.adjacent:hover {
            background: #4d3f35;
        }
        .tile.player {
            background: #3d2a1a;
            border-color: rgba(251,191,36,0.4);
        }
        .tile.portal {
            border-color: rgba(100,200,255,0.35);
            background: #2a2d35;
        }
        .tile.portal.adjacent {
            background: #353a45;
        }
        .tile.portal.adjacent:hover {
            background: #454a55;
        }
        .tile.blocked {
            background: #3d2a2a;
            border-color: rgba(180,80,80,0.4);
            cursor: not-allowed;
        }
        .tile.blocked.adjacent {
            cursor: not-allowed;
        }
        #player-sprite {
            position: absolute;
            z-index: 20;
            width: 72px;
            height: 72px;
            left: 336px;
            top: 192px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        #player-sprite .avatar {
            width: 44px;
            height: 44px;
            background: #5b1c03;
            border: 2px solid rgba(251,191,36,0.5);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .tile.gathering {
            border-color: rgba(120,180,80,0.45);
            background: #2a3324;
        }
        .tile.gathering.adjacent { background: #353d2a; }
        .tile.gathering.player { background: #2d3a1f; border-color: rgba(120,180,80,0.5); }
        /* 格子上有地面物品时的标记 */
        .tile.ground-items {
            border-color: rgba(212, 163, 115, 0.5);
            background: #332a24;
            box-shadow: inset 0 0 0 2px rgba(212, 163, 115, 0.25);
        }
        .tile.ground-items::after {
            content: '📦';
            position: absolute;
            right: 4px;
            bottom: 4px;
            font-size: 14px;
            line-height: 1;
            opacity: 0.9;
        }
        .tile.ground-items.adjacent { background: #3d3228; }
        .tile.ground-items.player { background: #2d241f; border-color: rgba(212, 163, 115, 0.6); }
        #footer {
            min-height: 48px;
            background: #1c1815;
            border-top: 1px solid #3d2d24;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 8px 16px;
            font-size: 13px;
            color: #78716c;
        }
        #footer .gather-btn {
            padding: 6px 14px;
            background: #3d332c;
            border: 1px solid #d4a373;
            border-radius: 4px;
            color: #e8e6e3;
            cursor: pointer;
            font-size: 13px;
        }
        #footer .gather-btn:hover { background: #4d3f35; }
        #footer .gather-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #footer .state { color: #a8a29e; }
        #footer .msg { color: #fbbf24; }
        /* 左侧状态面板 - 与 02-regions 2.5 一致 */
        #map-wrap { position: relative; }
        #hud-layer { position: absolute; inset: 0; pointer-events: none; z-index: 30; }
        #left-hud { position: absolute; left: 24px; top: 24px; bottom: 96px; width: 288px; display: flex; flex-direction: column; pointer-events: auto; transition: opacity 0.3s; }
        #status-scroll { flex: 1; overflow-y: auto; padding-right: 8px; }
        #status-scroll::-webkit-scrollbar { width: 3px; }
        #status-scroll::-webkit-scrollbar-thumb { background: rgba(212, 163, 115, 0.2); border-radius: 10px; }
        .status-card { background: rgba(28, 22, 18, 0.9); border: 1px solid #4d3f35; padding: 12px; font-size: 11px; font-weight: bold; margin-bottom: 12px; }
        .status-card .row { display: flex; justify-content: space-between; align-items: center; }
        .status-card .label { color: #78716c; }
        .status-card .value { color: #e8e6e3; }
        .status-card .value.ok { color: #22c55e; }
        .status-card .value.warn { color: #f59e0b; }
        .status-card .value.danger { color: #ef4444; }
        .status-card .block-title { font-size: 9px; color: rgba(251, 191, 36, 0.6); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; font-weight: 900; }
        .progress-wrap { height: 2px; background: #1c1917; overflow: hidden; margin-top: 4px; }
        .progress-fill { height: 100%; transition: width 0.15s ease-out; }
        .progress-fill.satiety { background: rgba(194, 65, 12, 0.6); }
        .progress-fill.thirst { background: rgba(29, 78, 216, 0.6); }
        .progress-fill.stamina { background: rgba(34, 197, 94, 0.6); }
        .progress-fill.energy { background: rgba(139, 92, 246, 0.6); }
        .role-card { background: rgba(45, 36, 30, 0.95); border: 2px solid rgba(212, 163, 115, 0.4); padding: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 12px; }
        .role-card h1 { font-size: 1.25rem; font-weight: 900; color: #fff; letter-spacing: 0.2em; margin: 0; }
        .role-card .subtitle { font-size: 10px; color: #fbbf24; font-weight: bold; margin-top: 4px; text-transform: uppercase; }
        .quick-belt { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 8px; background: rgba(28, 22, 18, 0.95); border: 2px solid #4d3f35; }
        .quick-belt .slot { aspect-ratio: 1; border: 1px solid #292524; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
        .quick-belt .slot:hover { border-color: #fbbf24; }
        .details-block { border: 1px solid #4d3f35; background: rgba(28, 25, 23, 0.2); }
        .details-block summary { padding: 8px; font-size: 10px; font-weight: 900; color: #57534e; cursor: pointer; list-style: none; display: flex; justify-content: space-between; text-transform: uppercase; }
        .details-block .details-body { padding: 12px; background: #1c1612; border-top: 1px solid #3d2d24; }
        .details-block .details-body .row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; }
        .details-block .details-body .row:last-child { margin-bottom: 0; }
        /* 右侧三按钮：背包 / 战斗技能 / 生活技能 - 02-regions 2.5 */
        #right-hud { position: absolute; right: 24px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 24px; z-index: 31; pointer-events: auto; }
        #right-hud .hud-btn { width: 56px; height: 56px; border-radius: 8px; border: 2px solid #4d3f35; background: rgba(28, 22, 18, 0.95); color: #e8e6e3; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s, background 0.2s; }
        #right-hud .hud-btn:hover { border-color: #fbbf24; background: rgba(45, 36, 30, 0.98); }
        /* 背包+装备面板：同一大面板，Tab 物品栏/装备栏 */
        #modal-backpack { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; pointer-events: auto; }
        #modal-backpack.show { display: flex; }
        #modal-backpack .panel { width: 95%; max-width: 720px; max-height: 85vh; background: #1c1612; border: 2px solid #d4a373; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        #modal-backpack .panel-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; gap: 24px; }
        #modal-backpack .panel-left { flex: 1; min-width: 0; }
        #modal-backpack .panel-right { width: 200px; flex-shrink: 0; }
        #modal-backpack .inv-region { margin-bottom: 16px; }
        #modal-backpack .inv-region h4 { font-size: 11px; color: rgba(251,191,36,0.8); margin: 0 0 8px 0; text-transform: uppercase; letter-spacing: 0.1em; }
        #modal-backpack .inv-grid { display: grid; grid-template-columns: repeat(6, 62px); gap: 4px; }
        #modal-backpack .inv-slot { width: 62px; height: 62px; border: 1px solid #4d3f35; background: rgba(0,0,0,0.3); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #e8e6e3; box-sizing: border-box; }
        #modal-backpack .inv-slot { position: relative; }
        #modal-backpack .inv-slot:hover { border-color: #fbbf24; }
        #modal-backpack .inv-slot .inv-slot-label { flex: 1; overflow: hidden; text-overflow: ellipsis; font-size: 11px; padding-right: 14px; padding-bottom: 12px; }
        #modal-backpack .inv-slot .inv-slot-drop { position: absolute; right: 2px; bottom: 2px; padding: 0 3px; font-size: 10px; line-height: 1.2; background: #4d3f35; border: 1px solid #78716c; color: #e8e6e3; border-radius: 2px; cursor: pointer; }
        #modal-backpack .inv-slot .inv-slot-drop:hover { background: #5c4a3d; border-color: #fbbf24; }
        #modal-backpack .inv-slot.inv-slot-equip { cursor: pointer; }
        #modal-backpack .ground-region { margin-top: 16px; padding-top: 12px; border-top: 1px solid #4d3f35; }
        #modal-backpack .ground-item-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; margin-bottom: 4px; background: rgba(45,36,30,0.8); border: 1px solid #4d3f35; border-radius: 4px; gap: 8px; }
        #modal-backpack .ground-item-row .ground-item-name { color: #e8e6e3; font-size: 12px; flex: 1; }
        #modal-backpack .ground-item-row .btn-pickup { padding: 2px 10px; font-size: 11px; background: #4d3f35; border: 1px solid #78716c; color: #e8e6e3; border-radius: 4px; cursor: pointer; }
        #modal-backpack .ground-item-row .btn-pickup:hover { background: #5c4a3d; border-color: #fbbf24; }
        #modal-backpack .equip-title { font-size: 11px; color: rgba(251,191,36,0.8); margin: 0 0 8px 0; text-transform: uppercase; letter-spacing: 0.1em; }
        #modal-backpack .equip-list { display: flex; flex-direction: column; gap: 6px; }
        #modal-backpack .equip-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; background: rgba(45,36,30,0.8); border: 1px solid #4d3f35; border-radius: 4px; gap: 8px; }
        #modal-backpack .equip-row .slot-name { color: #78716c; font-size: 11px; min-width: 72px; }
        #modal-backpack .equip-row .item-name { color: #e8e6e3; font-size: 12px; flex: 1; }
        #modal-backpack .equip-row .btn-unequip { padding: 2px 8px; font-size: 11px; background: #4d3f35; border: 1px solid #78716c; color: #e8e6e3; border-radius: 4px; cursor: pointer; }
        #modal-backpack .equip-row .btn-unequip:hover { background: #5c4a3d; border-color: #fbbf24; }
        #modal-backpack .panel-close { padding: 10px; border-top: 1px solid #4d3f35; text-align: center; cursor: pointer; color: #fbbf24; font-weight: bold; }
        #modal-backpack .panel-close:hover { background: rgba(212,163,115,0.15); }
        /* 物品信息悬浮窗（替代浏览器 title） */
        #item-tooltip { display: none; position: fixed; z-index: 1000; min-width: 200px; max-width: 320px; padding: 12px 14px; background: rgba(28, 22, 18, 0.98); border: 2px solid #d4a373; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); pointer-events: none; font-size: 12px; line-height: 1.45; color: #e8e6e3; }
        #item-tooltip.show { display: block; }
        #item-tooltip .tooltip-name { font-size: 14px; font-weight: bold; color: #fbbf24; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #4d3f35; }
        #item-tooltip .tooltip-desc { color: #a8a29e; margin-bottom: 8px; white-space: pre-wrap; word-break: break-word; }
        #item-tooltip .tooltip-attrs { color: #78716c; font-size: 11px; white-space: pre-line; }
    </style>
</head>
<body>
    <div id="item-tooltip"></div>

    <div id="map-wrap">
        <div id="map-container">
            <div id="map-grid"></div>
            <div id="player-sprite">
                <div class="avatar">👤</div>
            </div>
        </div>
        <!-- 左侧人物状态区：与 demo / 02-regions 2.5 一致 -->
        <div id="hud-layer">
            <div id="left-hud">
                <div class="role-card">
                    <h1 id="status-role-name">旅人</h1>
                    <p class="subtitle" id="status-role-title">称号 · 初入末世</p>
                </div>
                <div id="status-scroll">
                    <div class="status-card" id="status-instant">
                        <div class="row"><span class="label">生命状态</span><span class="value" id="status-life">健康</span></div>
                        <div class="row"><span class="label">身手感官</span><span class="value" id="status-dex">轻快</span></div>
                    </div>
                    <div class="status-card" id="status-limbs">
                        <div class="block-title">肢体检视</div>
                        <div class="row"><span>头</span><span id="limb-head">完好</span></div>
                        <div class="row"><span>胸</span><span id="limb-chest">完好</span></div>
                        <div class="row"><span>腹</span><span id="limb-belly">完好</span></div>
                        <div class="row"><span>左手</span><span id="limb-lhand">完好</span></div>
                        <div class="row"><span>右手</span><span id="limb-rhand">完好</span></div>
                        <div class="row"><span>左脚</span><span id="limb-lfoot">完好</span></div>
                        <div class="row"><span>右脚</span><span id="limb-rfoot">完好</span></div>
                    </div>
                    <div class="status-card" id="status-survival">
                        <div class="block-title">生存循环</div>
                        <div class="survival-row">
                            <div class="row"><span class="label">饱食</span><span class="value" id="status-satiety-text">正常</span></div>
                            <div class="progress-wrap"><div class="progress-fill satiety" id="status-satiety-bar" style="width:100%"></div></div>
                        </div>
                        <div class="survival-row" style="margin-top:12px">
                            <div class="row"><span class="label">饮水</span><span class="value" id="status-thirst-text">正常</span></div>
                            <div class="progress-wrap"><div class="progress-fill thirst" id="status-thirst-bar" style="width:100%"></div></div>
                        </div>
                        <div class="survival-row" style="margin-top:12px">
                            <div class="row"><span class="label">体力</span><span class="value" id="status-stamina-text">—</span></div>
                            <div class="progress-wrap"><div class="progress-fill stamina" id="status-stamina-bar" style="width:100%"></div></div>
                        </div>
                        <div class="survival-row" style="margin-top:12px">
                            <div class="row"><span class="label">精力</span><span class="value" id="status-energy-text">—</span></div>
                            <div class="progress-wrap"><div class="progress-fill energy" id="status-energy-bar" style="width:100%"></div></div>
                        </div>
                        <div class="row" style="margin-top:8px"><span class="label">体重</span><span class="value" id="status-weight">—</span></div>
                        <div class="row" style="margin-top:4px"><span class="label">负重</span><span class="value" id="status-carry">—</span></div>
                    </div>
                    <div class="quick-belt" id="quick-belt"></div>
                    <details class="details-block" open>
                        <summary>基础五维 <span>▼</span></summary>
                        <div class="details-body">
                            <div class="row"><span class="label">筋骨</span><span class="value">—</span></div>
                            <div class="row"><span class="label">柔韧</span><span class="value">—</span></div>
                            <div class="row"><span class="label">呼吸</span><span class="value">—</span></div>
                            <div class="row"><span class="label">身手</span><span class="value">—</span></div>
                            <div class="row"><span class="label">专注</span><span class="value">—</span></div>
                        </div>
                    </details>
                </div>
            </div>
            <!-- 右侧三按钮：背包、战斗技能、生活技能 -->
            <div id="right-hud">
                <button type="button" class="hud-btn" id="btn-backpack" title="背包">🎒</button>
                <button type="button" class="hud-btn" id="btn-combat" title="战斗技能">⚔️</button>
                <button type="button" class="hud-btn" id="btn-life" title="生活技能">⚙️</button>
            </div>
        </div>
        <!-- 背包+装备面板：左物品栏、右装备栏 -->
        <div id="modal-backpack">
            <div class="panel">
                <div class="panel-body">
                    <div class="panel-left">
                        <div class="inv-region" id="inv-region-pocket"><h4>口袋</h4><div class="inv-grid" id="inv-grid-pocket"></div></div>
                        <div class="inv-region" id="inv-region-vest"><h4>背心</h4><div class="inv-grid" id="inv-grid-vest"></div></div>
                        <div class="inv-region" id="inv-region-backpack"><h4>背包</h4><div class="inv-grid" id="inv-grid-backpack"></div></div>
                        <div class="inv-region" id="inv-region-vehicle"><h4>载具</h4><div class="inv-grid" id="inv-grid-vehicle"></div></div>
                        <div class="inv-region ground-region" id="inv-region-ground"><h4>脚下物品</h4><div id="ground-items-list"></div></div>
                    </div>
                    <div class="panel-right">
                        <h4 class="equip-title">装备栏</h4>
                        <div class="equip-list" id="equip-list"></div>
                    </div>
                </div>
                <div class="panel-close" id="backpack-panel-close">关闭</div>
            </div>
        </div>
    </div>

    <div id="footer">
        <span id="footer-text">基地 · 方向键或点击相邻格子移动</span>
        <span id="footer-state" class="state"></span>
        <button type="button" id="gather-btn" class="gather-btn" style="display:none;">采集（挂机）</button>
        <button type="button" id="gather-stop-btn" class="gather-btn" style="display:none;">停止采集</button>
        <span id="footer-msg" class="msg"></span>
    </div>

    <script src="js/game-engine.js"></script>
    <script src="js/survival.js"></script>
    <script src="js/inventory-equipment.js"></script>
    <script src="js/gathering.js"></script>
    <script>
        (function () {
            var E = window.GameEngine;
            var G = window.Gathering;
            var IE = window.InventoryEquipment;
            var CELL_PX = E.CELL_PX;
            var CENTER_OFFSET_X = E.CENTER_OFFSET_X;
            var CENTER_OFFSET_Y = E.CENTER_OFFSET_Y;

            var lastMsg = '';
            var msgTimeout = null;
            var IDLE_TICK_MS = 3000;
            var gatheringIdleTimer = null;
            var gatheringIdleAt = null;

            function showMsg(text) {
                lastMsg = text;
                var el = document.getElementById('footer-msg');
                if (el) el.textContent = text;
                if (msgTimeout) clearTimeout(msgTimeout);
                msgTimeout = setTimeout(function () {
                    if (document.getElementById('footer-msg').textContent === lastMsg)
                        document.getElementById('footer-msg').textContent = '';
                }, 3000);
            }

            var defaultGatheringPoints = { gathering_bush: { gathering_point_id: 'gathering_bush', display_name: '灌木丛', base_gathering_success_rate: 0.6, loot_table_id: 'loot_bush', stamina_cost: 2, tool_required: false }, gathering_grass: { gathering_point_id: 'gathering_grass', display_name: '草丛', base_gathering_success_rate: 0.6, loot_table_id: 'loot_grass', stamina_cost: 2, tool_required: false } };
            var defaultLootTables = { loot_bush: [ { item_id: 'wild_fruit_red', weight: 40, quality_tier: 1 }, { item_id: 'wild_fruit_red', weight: 30, quality_tier: 2 }, { item_id: 'wild_fruit_purple', weight: 25, quality_tier: 2 }, { item_id: 'wild_fruit_yellow', weight: 15, quality_tier: 3 }, { item_id: 'wild_fruit_purple', weight: 10, quality_tier: 4 }, { item_id: 'wild_fruit_yellow', weight: 5, quality_tier: 5 }, { item_id: 'wild_fruit_red', weight: 2, quality_tier: 6 } ], loot_grass: [ { item_id: 'herb_green', weight: 40, quality_tier: 1 }, { item_id: 'herb_green', weight: 30, quality_tier: 2 }, { item_id: 'herb_bitter', weight: 25, quality_tier: 2 }, { item_id: 'herb_sweet', weight: 15, quality_tier: 3 }, { item_id: 'herb_bitter', weight: 10, quality_tier: 4 }, { item_id: 'herb_sweet', weight: 5, quality_tier: 5 }, { item_id: 'herb_green', weight: 2, quality_tier: 6 } ] };
            var defaultItems = { wild_fruit_red: { item_id: 'wild_fruit_red', name: '红野果', weight_kg: 0.1 }, wild_fruit_purple: { item_id: 'wild_fruit_purple', name: '紫野果', weight_kg: 0.1 }, wild_fruit_yellow: { item_id: 'wild_fruit_yellow', name: '黄野果', weight_kg: 0.1 }, herb_green: { item_id: 'herb_green', name: '青草药', weight_kg: 0.1 }, herb_bitter: { item_id: 'herb_bitter', name: '苦叶草', weight_kg: 0.1 }, herb_sweet: { item_id: 'herb_sweet', name: '甘香草', weight_kg: 0.1 } };

            var tooltipEl = null;

            function showItemTooltip(html, anchorEl) {
                if (!tooltipEl) tooltipEl = document.getElementById('item-tooltip');
                if (!tooltipEl || !html) return;
                tooltipEl.innerHTML = html;
                tooltipEl.style.left = '-9999px';
                tooltipEl.style.top = '0';
                tooltipEl.classList.add('show');
                if (tooltipHideTimer) { clearTimeout(tooltipHideTimer); tooltipHideTimer = null; }
                requestAnimationFrame(function () {
                    var rect = anchorEl.getBoundingClientRect();
                    var tr = tooltipEl.getBoundingClientRect();
                    var tw = tr.width || 220;
                    var th = tr.height || 100;
                    var pad = 12;
                    var left = rect.right + pad;
                    var top = rect.top;
                    if (left + tw > window.innerWidth - pad) left = rect.left - tw - pad;
                    if (left < pad) left = pad;
                    if (top + th > window.innerHeight - pad) top = window.innerHeight - th - pad;
                    if (top < pad) top = pad;
                    tooltipEl.style.left = left + 'px';
                    tooltipEl.style.top = top + 'px';
                });
            }
            function hideItemTooltip() {
                if (!tooltipEl) tooltipEl = document.getElementById('item-tooltip');
                if (tooltipEl) tooltipEl.classList.remove('show');

            function formatItemAttributes(tpl) {
                if (!tpl) return '';
                var lines = [];
                if (tpl.weight_kg != null) lines.push('重量：' + tpl.weight_kg + ' kg');
                if (tpl.pocket_slots != null) lines.push('口袋：' + tpl.pocket_slots + ' 格');
                if (tpl.vest_slots != null) lines.push('背心栏：' + tpl.vest_slots + ' 格');
                if (tpl.backpack_slots != null) lines.push('背包：' + tpl.backpack_slots + ' 格');
                if (tpl.backpack_weight_factor != null) lines.push('背包减重：' + (tpl.backpack_weight_factor * 100) + '%');
                if (tpl.damage_reduce_slash_pct != null || tpl.damage_reduce_pierce_pct != null || tpl.damage_reduce_blunt_pct != null) {
                    var dr = [];
                    if (tpl.damage_reduce_slash_pct != null && tpl.damage_reduce_slash_pct > 0) dr.push('劈砍 ' + (tpl.damage_reduce_slash_pct * 100) + '%');
                    if (tpl.damage_reduce_pierce_pct != null && tpl.damage_reduce_pierce_pct > 0) dr.push('戳刺 ' + (tpl.damage_reduce_pierce_pct * 100) + '%');
                    if (tpl.damage_reduce_blunt_pct != null && tpl.damage_reduce_blunt_pct > 0) dr.push('钝击 ' + (tpl.damage_reduce_blunt_pct * 100) + '%');
                    if (dr.length) lines.push('减伤：' + dr.join('、'));
                }
                if (tpl.skill_coef != null) lines.push('技能系数：' + tpl.skill_coef);
                if (tpl.req_innate_jingu != null) lines.push('先天筋骨要求：' + tpl.req_innate_jingu);
                if (tpl.enchant_slots != null) lines.push('词条槽：' + tpl.enchant_slots);
                if (tpl.quality_tier != null && IE && IE.QUALITY_NAMES) lines.push('品质：' + (IE.QUALITY_NAMES[tpl.quality_tier] || '—'));
                return lines.length ? lines.join('\n') : '';
            }
            function buildItemTooltipHtml(name, desc, attrs) {
                var html = '<div class="tooltip-name">' + (name || '').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>';
                if (desc) html += '<div class="tooltip-desc">' + (desc || '').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>') + '</div>';
                if (attrs) html += '<div class="tooltip-attrs">' + (attrs || '').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>') + '</div>';
                return html;
            }

            function loadConfig() {
                var base = 'data/';
                return Promise.all([
                    fetch(base + 'gathering_points.json').then(function (r) { return r.ok ? r.json() : defaultGatheringPoints; }).catch(function () { return defaultGatheringPoints; }),
                    fetch(base + 'loot_tables.json').then(function (r) { return r.ok ? r.json() : defaultLootTables; }).catch(function () { return defaultLootTables; }),
                    fetch(base + 'items.json').then(function (r) { return r.ok ? r.json() : defaultItems; }).catch(function () { return defaultItems; }),
                    fetch(base + 'survival-config.json').then(function (r) { return r.ok ? r.json() : {}; }).catch(function () { return {}; }),
                    fetch(base + 'equipment.json').then(function (r) { return r.ok ? r.json() : {}; }).catch(function () { return {}; }),
                    fetch(base + 'enchant.json').then(function (r) { return r.ok ? r.json() : {}; }).catch(function () { return {}; }),
                    fetch(base + 'default_equipment.json').then(function (r) { return r.ok ? r.json() : {}; }).catch(function () { return {}; })
                ]).then(function (arr) {
                    G.setConfig({
                        gathering_points: arr[0],
                        loot_tables: arr[1],
                        items: arr[2]
                    });
                    if (window.Survival) window.Survival.setConfig(arr[3]);
                    var survCfg = arr[3] || {};
                    IE.setConfig({
                        equipment: arr[4],
                        items: arr[2],
                        enchant: arr[5],
                        default_equipment: arr[6],
                        item_display_tier_threshold_1: survCfg.item_display_tier_threshold_1,
                        item_display_tier_threshold_2: survCfg.item_display_tier_threshold_2
                    });
                    IE.initNewGame();
                });
            }

            function updateBackpackPanel() {
                if (!IE) return;

                var char = IE.getCharacterForDisplay();
                var pocketSlots = IE.getPocketSlots(), vestSlots = IE.getVestSlots(), backpackSlots = IE.getBackpackSlots();
                var vehicleSlots = (st.inventory_vehicle && st.inventory_vehicle.length) ? st.inventory_vehicle.length : (st.bound_vehicle_id ? 8 : 0);
                var pocketGrid = document.getElementById('inv-grid-pocket');

                var backpackGrid = document.getElementById('inv-grid-backpack');
                var vehicleGrid = document.getElementById('inv-grid-vehicle');

                var vestRegion = document.getElementById('inv-region-vest');
                var backpackRegion = document.getElementById('inv-region-backpack');
                var vehicleRegion = document.getElementById('inv-region-vehicle');
                function fillGrid(container, arr, maxSlots, containerType) {
                    if (!container) return;

                    for (var i = 0; i < maxSlots; i++) {
                        var cell = document.createElement('div');

                                    updateQuickBelt();
                                    render();

                var staminaBar = document.getElementById('status-stamina-bar');
                var energyText = document.getElementById('status-energy-text');
                var energyBar = document.getElementById('status-energy-bar');
                var weightEl = document.getElementById('status-weight');
                if (!lifeEl) return;

                if (Surv && typeof Surv.getState === 'function') {
                    var s = Surv.getState();
                    if (s.isDead) { lifeEl.textContent = '死亡'; lifeEl.className = 'value danger'; }
                    else if (s.isComa) { lifeEl.textContent = '昏迷'; lifeEl.className = 'value warn'; }
                    else { lifeEl.textContent = '健康'; lifeEl.className = 'value ok'; }

                    var zone = Surv.getSatietyZone ? Surv.getSatietyZone() : 'normal';
                    satietyText.textContent = getSatietyLabel(zone);
                    satietyText.className = zone === 'normal' ? 'value ok' : (zone === 'starvation' || zone === 'severe' ? 'value danger' : 'value warn');
                    var satMax = 120;
                    var satPct = Math.min(100, (s.satiety / satMax) * 100);
                    satietyBar.style.width = satPct + '%';

                    thirstText.textContent = getThirstLabel(s.thirst);
                    thirstText.className = s.thirst >= 60 ? 'value ok' : (s.thirst <= 0 ? 'value danger' : 'value warn');
                    thirstBar.style.width = s.thirst + '%';

                    var stamMax = s.stamina_max || 100;
                    staminaText.textContent = s.stamina.toFixed(1) + ' / ' + stamMax;
                    staminaText.className = s.stamina <= 0 ? 'value danger' : (s.stamina < stamMax * 0.3 ? 'value warn' : 'value ok');
                    staminaBar.style.width = stamMax > 0 ? (s.stamina / stamMax * 100) + '%' : '0%';

                    var enMax = s.energy_max || 100;
                    energyText.textContent = s.energy.toFixed(1) + ' / ' + enMax;
                    energyText.className = s.energy <= 0 ? 'value danger' : (s.energy < enMax * 0.3 ? 'value warn' : 'value ok');
                    energyBar.style.width = enMax > 0 ? (s.energy / enMax * 100) + '%' : '0%';

                    weightEl.textContent = s.weight_kg + ' kg';
                    var carryEl = document.getElementById('status-carry');
                    if (carryEl) carryEl.textContent = '—';
                } else {
                    lifeEl.textContent = '健康';
                    lifeEl.className = 'value ok';
                    satietyText.textContent = '—';
                    satietyBar.style.width = '100%';
                    thirstText.textContent = '—';
                    thirstBar.style.width = '100%';
                    if (gatherState) {
                        staminaText.textContent = gatherState.stamina + ' / ' + gatherState.stamina_max;
                        staminaBar.style.width = (gatherState.stamina_max > 0 ? (gatherState.stamina / gatherState.stamina_max * 100) : 0) + '%';
                    } else {
                        staminaText.textContent = '—';
                        staminaBar.style.width = '100%';
                    }
                    energyText.textContent = '—';
                    energyBar.style.width = '100%';
                    weightEl.textContent = '—';
                    var carryEl = document.getElementById('status-carry');
                    if (carryEl) carryEl.textContent = '—';
                }
                dexEl.textContent = '轻快';
            }

            function stopGatheringIdle() {
                if (gatheringIdleTimer) {
                    clearInterval(gatheringIdleTimer);
                    gatheringIdleTimer = null;
                    gatheringIdleAt = null;
                }
            }

            function onGatherTick() {
                var st = E.getState();
                var entityId = E.getEntityAt(st.x, st.y);
                if (!entityId || !G.canGather(entityId)) {
                    stopGatheringIdle();
                    if (!G.canGather(entityId) && entityId) showMsg('背包已满或体力不足，已停止采集');
                    render();
                    return;
                }
                var result = G.doGather(entityId);
                if (result.success && result.gathered) showMsg(result.message);
                else if (!result.success) showMsg(result.message);
                render();
            }

            function onGatherClick() {
                var st = E.getState();
                var entityId = E.getEntityAt(st.x, st.y);
                if (!entityId || !G.canGather(entityId)) return;
                if (gatheringIdleTimer) return;
                gatheringIdleAt = { mapId: st.mapId, x: st.x, y: st.y };
                onGatherTick();
                gatheringIdleTimer = setInterval(onGatherTick, IDLE_TICK_MS);
                render();
            }

            function onGatherStopClick() {
                stopGatheringIdle();
                showMsg('已停止采集');
                render();
            }

            E.onChange(function () {
                if (gatheringIdleTimer && gatheringIdleAt) {
                    var st = E.getState();
                    if (st.mapId !== gatheringIdleAt.mapId || st.x !== gatheringIdleAt.x || st.y !== gatheringIdleAt.y)
                        stopGatheringIdle();
                }
                render();
            });

            document.addEventListener('keydown', function (e) {
                var dx = 0, dy = 0;
                switch (e.key) {
                    case 'ArrowUp':    case 'w': case 'W': dy = -1; break;
                    case 'ArrowDown':  case 's': case 'S': dy =  1; break;
                    case 'ArrowLeft':  case 'a': case 'A': dx = -1; break;
                    case 'ArrowRight': case 'd': case 'D': dx =  1; break;
                    default: return;
                }
                e.preventDefault();
                var st = E.getState();
                if (E.moveTo(st.x + dx, st.y + dy)) stopGatheringIdle();
            });

            if (document.getElementById('gather-btn')) {
                document.getElementById('gather-btn').addEventListener('click', onGatherClick);
            }
            if (document.getElementById('gather-stop-btn')) {
                document.getElementById('gather-stop-btn').addEventListener('click', onGatherStopClick);
            }

            var backpackPanelOpen = false;
            function openBackpackPanel() {
                if (backpackPanelOpen) return;
                if (window.Survival && typeof window.Survival.advanceTick === 'function') window.Survival.advanceTick();
                backpackPanelOpen = true;
                document.getElementById('modal-backpack').classList.add('show');
                updateBackpackPanel();
                render();
            }
            function closeBackpackPanel() {
                if (!backpackPanelOpen) return;
                if (window.Survival && typeof window.Survival.advanceTick === 'function') window.Survival.advanceTick();
                backpackPanelOpen = false;
                document.getElementById('modal-backpack').classList.remove('show');
                render();
            }
            if (document.getElementById('btn-backpack')) {
                document.getElementById('btn-backpack').addEventListener('click', function () {
                    if (backpackPanelOpen) closeBackpackPanel(); else openBackpackPanel();
                });
            }
            if (document.getElementById('backpack-panel-close')) {
                document.getElementById('backpack-panel-close').addEventListener('click', closeBackpackPanel);
            }

            function init() {
                loadConfig().then(function () {
                    render();
                }).catch(function () { render(); });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
